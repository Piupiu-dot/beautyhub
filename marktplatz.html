<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BeautyHub - Marktplatz</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Jost',sans-serif;background:#faf8f5;min-height:100vh;padding-bottom:80px}.header{background:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EAE0;position:sticky;top:0;z-index:100}.header h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#1A1A2E}.header-actions{display:flex;gap:10px;align-items:center}.btn-new{background:#b8924a;color:#fff;border:none;border-radius:10px;padding:8px 16px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer}.avatar{width:36px;height:36px;border-radius:50%;background:#b8924a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;cursor:pointer}.filter-wrap{overflow-x:auto;padding:14px 16px;background:#fff;border-bottom:1px solid #F0EAE0;scrollbar-width:none}.filter-wrap::-webkit-scrollbar{display:none}.filters{display:flex;gap:8px;white-space:nowrap}.filter-btn{padding:8px 16px;border-radius:20px;border:1.5px solid #E8E0D5;background:#fff;font-family:'Jost',sans-serif;font-size:13px;color:#6B6B6B;cursor:pointer;transition:all .2s;font-weight:500}.filter-btn.active{background:#1A1A2E;color:#fff;border-color:#1A1A2E}.sort-wrap{padding:12px 16px;display:flex;gap:16px;border-bottom:1px solid #F0EAE0}.sort-btn{font-size:13px;color:#9A9A9A;cursor:pointer;font-weight:500;padding:4px 0;border-bottom:2px solid transparent;transition:all .2s}.sort-btn.active{color:#b8924a;border-bottom-color:#b8924a}.grid{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.inserat{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.05);cursor:pointer;transition:transform .15s}.inserat:active{transform:scale(0.98)}.inserat-img{width:100%;height:130px;background:#F5EFE8;display:flex;align-items:center;justify-content:center;position:relative}.inserat-img svg{opacity:.3}.badge-zustand{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:600;letter-spacing:.3px}.badge-neu{background:#E8F5E9;color:#2E7D32}.badge-gebraucht{background:#FFF3E0;color:#E65100}.inserat-body{padding:12px}.inserat-titel{font-size:14px;font-weight:600;color:#1A1A2E;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.inserat-preis{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#b8924a}.inserat-ort{font-size:11px;color:#9A9A9A;margin-top:3px}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}.modal-overlay.open{display:flex}.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;padding-bottom:40px;max-height:90vh;overflow-y:auto}.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:#1A1A2E;margin-bottom:20px}.form-group{margin-bottom:16px}label{display:block;font-size:11px;font-weight:500;color:#6B6B6B;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}input,select,textarea{width:100%;padding:13px 16px;border:1.5px solid #E8E0D5;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;color:#1A1A2E;background:#faf8f5;outline:none;transition:border .2s}input:focus,select:focus,textarea:focus{border-color:#b8924a;background:#fff}textarea{resize:none;height:100px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.modal-actions{display:flex;gap:10px;margin-top:20px}.btn-cancel{flex:1;padding:13px;border:1.5px solid #E8E0D5;background:#fff;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;color:#6B6B6B}.btn-submit{flex:2;padding:13px;background:#b8924a;color:#fff;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;font-weight:500;cursor:pointer}.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}.detail-overlay.open{display:flex}.detail-card{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;padding-bottom:40px;max-height:90vh;overflow-y:auto}.detail-img{width:100%;height:200px;background:#F5EFE8;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}.detail-img svg{opacity:.25}.detail-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#1A1A2E;margin-bottom:8px}.detail-preis{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#b8924a;margin-bottom:16px}.detail-info{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}.detail-tag{padding:4px 12px;background:#F5EFE8;border-radius:20px;font-size:12px;color:#6B6B6B}.detail-beschreibung{font-size:14px;color:#5A5A5A;line-height:1.7;margin-bottom:20px}.btn-kontakt{width:100%;padding:15px;background:#b8924a;color:#fff;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-bottom:10px}.btn-close{width:100%;padding:13px;border:1.5px solid #E8E0D5;background:#fff;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;color:#6B6B6B}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EAE0;display:flex;padding:8px 0 20px}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4}.nav-item.active{opacity:1}.nav-item span{font-size:10px;font-weight:500;color:#1A1A2E}.nav-item svg{width:22px;height:22px;stroke:#1A1A2E;fill:none;stroke-width:1.8}.skeleton{background:linear-gradient(90deg,#f0ebe4 25%,#e8e0d8 50%,#f0ebe4 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:16px;height:200px}@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="header"><h1>Marktplatz</h1><div class="header-actions"><button class="btn-new" onclick="openNew()">+ Inserieren</button><div class="avatar" id="av" onclick="location.href='profil.html'">M</div></div></div><div class="filter-wrap"><div class="filters"><button class="filter-btn active" onclick="setK('alle',this)">Alle</button><button class="filter-btn" onclick="setK('geraete',this)">Geraete</button><button class="filter-btn" onclick="setK('produkte',this)">Produkte</button><button class="filter-btn" onclick="setK('mobel',this)">Moebel</button><button class="filter-btn" onclick="setK('kurse',this)">Kurse</button><button class="filter-btn" onclick="setK('sonstiges',this)">Sonstiges</button></div></div><div class="sort-wrap"><span class="sort-btn active" onclick="setS('neu',this)">Neueste</span><span class="sort-btn" onclick="setS('preis_auf',this)">Preis aufsteigend</span><span class="sort-btn" onclick="setS('preis_ab',this)">Preis absteigend</span></div><div class="grid" id="grid"></div><div class="modal-overlay" id="newModal"><div class="modal"><div class="modal-title">Inserat erstellen</div><div class="form-group"><label>Titel</label><input type="text" id="ins-titel" placeholder="z.B. IPL Geraet Lumenis M22"></div><div class="form-group"><label>Beschreibung</label><textarea id="ins-beschr" placeholder="Zustand, Alter, Zubehoer..."></textarea></div><div class="row2"><div class="form-group"><label>Preis (CHF)</label><input type="number" id="ins-preis" placeholder="0"></div><div class="form-group"><label>Kategorie</label><select id="ins-kat"><option value="geraete">Geraete</option><option value="produkte">Produkte</option><option value="mobel">Moebel</option><option value="kurse">Kurse</option><option value="sonstiges">Sonstiges</option></select></div></div><div class="row2"><div class="form-group"><label>Zustand</label><select id="ins-zustand"><option value="neu">Neu</option><option value="gebraucht">Gebraucht</option><option value="generalueberholt">Generalueberholt</option></select></div><div class="form-group"><label>Standort</label><input type="text" id="ins-ort" placeholder="z.B. Zuerich"></div></div><div class="modal-actions"><button class="btn-cancel" onclick="closeNew()">Abbrechen</button><button class="btn-submit" onclick="submitInserat()">Veroeffentlichen</button></div></div></div><div class="detail-overlay" id="detailModal"><div class="detail-card" id="detailContent"></div></div><nav class="bottom-nav"><div class="nav-item" onclick="location.href='feed.html'"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Feed</span></div><div class="nav-item" onclick="location.href='community.html'"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg><span>Community</span></div><div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span>Markt</span></div><div class="nav-item" onclick="location.href='dokumente.html'"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Docs</span></div><div class="nav-item" onclick="location.href='profil.html'"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profil</span></div></nav><script>const sb=supabase.createClient('https://ypdybccegznjlxzqqxut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZHliY2NlZ3puamx4enFxeHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTgzNjQsImV4cCI6MjA5MjY5NDM2NH0.hs3ssZBVDHqOu3ufn4mB3trrMzGuDsQfjnB9Q9rxixU');let kat='alle',sort='neu';const demo=[{id:1,titel:'IPL Geraet Lumenis M22 - Top Zustand',beschreibung:'Wenig benutzt, alle Handtuecke vorhanden. Ideal fuer Haarentfernung und Gefaessbehandlung. Serviciert 2024.',kategorie:'geraete',preis:4800,zustand:'gebraucht',standort:'Zuerich',likes:0},{id:2,titel:'Nagelfraeser Dremel Professional Set',beschreibung:'Komplettes Set mit 12 Bits, kaum benutzt. Ideal fuer Anfaenger und Fortgeschrittene.',kategorie:'geraete',preis:120,zustand:'neu',standort:'Bern',likes:0},{id:3,titel:'Profi-Kosmetikliege klappbar weiss',beschreibung:'Stabile Liege mit Memory-Foam Polster. Klappbar, leicht zu transportieren. 2 Jahre alt, sehr guter Zustand.',kategorie:'mobel',preis:350,zustand:'gebraucht',standort:'Basel',likes:0},{id:4,titel:'PMU Kurs Grundlagen fuer Anfaenger',beschreibung:'2-taegiger Intensivkurs in Zuerich. Theorie und Praxis, Material inklusive. Naechster Termin: Juni 2026.',kategorie:'kurse',preis:480,zustand:'neu',standort:'Zuerich',likes:0}];function svgIcon(){return`<svg width="50" height="50" viewBox="0 0 50 50" fill="none"><rect x="8" y="12" width="34" height="26" rx="4" stroke="#8a7055" stroke-width="1.5"/><path d="M8 20h34" stroke="#8a7055" stroke-width="1.5"/><circle cx="16" cy="16" r="2" stroke="#8a7055" stroke-width="1.2"/></svg>`;}function card(p){return`<div class="inserat" onclick="showDetail(${JSON.stringify(p).replace(/"/g,'&quot;')})"><div class="inserat-img">${svgIcon()}<span class="badge-zustand badge-${p.zustand==='neu'?'neu':'gebraucht'}">${p.zustand==='neu'?'Neu':'Gebraucht'}</span></div><div class="inserat-body"><div class="inserat-titel">${p.titel}</div><div class="inserat-preis">CHF ${Number(p.preis).toLocaleString('de-CH')}</div><div class="inserat-ort">${p.standort||''}</div></div></div>`;}function showDetail(p){const c=document.getElementById('detailContent');c.innerHTML=`<div class="detail-img">${svgIcon()}</div><div class="detail-title">${p.titel}</div><div class="detail-preis">CHF ${Number(p.preis).toLocaleString('de-CH')}</div><div class="detail-info"><span class="detail-tag">${p.kategorie||''}</span><span class="detail-tag">${p.zustand||''}</span><span class="detail-tag">${p.standort||''}</span></div><div class="detail-beschreibung">${p.beschreibung||''}</div><button class="btn-kontakt" onclick="alert('Kontaktfunktion folgt in Kuerze!')">Verkaeuferin kontaktieren</button><button class="btn-close" onclick="document.getElementById('detailModal').classList.remove('open')">Schliessen</button>`;document.getElementById('detailModal').classList.add('open');}function setK(k,el){kat=k;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}function setS(s,el){sort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}function openNew(){document.getElementById('newModal').classList.add('open');}function closeNew(){document.getElementById('newModal').classList.remove('open');}async function submitInserat(){const titel=document.getElementById('ins-titel').value.trim();const beschr=document.getElementById('ins-beschr').value.trim();const preis=document.getElementById('ins-preis').value;const kategorie=document.getElementById('ins-kat').value;const zustand=document.getElementById('ins-zustand').value;const ort=document.getElementById('ins-ort').value;if(!titel||!preis)return alert('Bitte Titel und Preis angeben.');const{data:user}=await sb.auth.getUser();if(!user?.user){alert('Bitte zuerst anmelden.');closeNew();return;}const{error}=await sb.from('inserate').insert({titel,beschreibung:beschr,preis:parseFloat(preis),kategorie,zustand,standort:ort,verkaeuferin_id:user.user.id,aktiv:true});if(!error){closeNew();load();}else{alert('Fehler: '+error.message);}}async function load(){const g=document.getElementById('grid');g.innerHTML='<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';try{let q=sb.from('inserate').select('*').eq('aktiv',true);if(kat!=='alle')q=q.eq('kategorie',kat);if(sort==='preis_auf')q=q.order('preis',{ascending:true});else if(sort==='preis_ab')q=q.order('preis',{ascending:false});else q=q.order('erstellt_am',{ascending:false});const{data,error}=await q;const items=(error||!data||!data.length)?demo.filter(d=>kat==='alle'||d.kategorie===kat):data;g.innerHTML=items.length?items.map(card).join(''):`<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#9A9A9A">Keine Inserate gefunden</div>`;}catch(e){g.innerHTML=demo.map(card).join('');}}async function init(){const{data}=await sb.auth.getUser();if(data?.user){const n=data.user.user_metadata?.name||data.user.email||'M';document.getElementById('av').textContent=n[0].toUpperCase();}}init();load();</script></body></html>
