vg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}.btn-close{flex:1;padding:14px;border:1.5px solid #E8E0D5;background:#fff;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;color:#6B6B6B}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EAE0;display:flex;padding:8px 0 20px}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4}.nav-item.active{opacity:1}.nav-item span{font-size:10px;font-weight:500;color:#1A1A2E}.nav-item svg{width:22px;height:22px;stroke:#1A1A2E;fill:none;stroke-width:1.8}.skeleton{background:linear-gradient(90deg,#f0ebe4 25%,#e8e0d8 50%,#f0ebe4 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:16px;height:80px;margin-bottom:10px}@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="header"><h1>Dokumente</h1><div class="avatar" id="av" onclick="location.href='profil.html'">M</div></div><div class="search-wrap"><svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9A9A9A" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-input" type="text" placeholder="Dokumente suchen..." id="searchInput" oninput="filterDocs()"></div><div class="filter-wrap"><div class="filters"><button class="filter-btn active" onclick="setTyp('alle',this)">Alle</button><button class="filter-btn" onclick="setTyp('checkliste',this)">Checklisten</button><button class="filter-btn" onclick="setTyp('vorlage',this)">Vorlagen</button><button class="filter-btn" onclick="setTyp('info',this)">Infoblaetter</button><button class="filter-btn" onclick="setTyp('gesetz',this)">Gesetze</button></div></div><div id="content"></div><div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div><nav class="bottom-nav"><div class="nav-item" onclick="location.href='fe lligungsformular fuer PMU-Behandlungen. Pigmentinhaltsstoffe, REACH-Konformitaet und Nachsorgehinweise inklusive.',typ:'vorlage',nischen:'pmu',seiten:4,downloads:312},{id:4,titel:'Kosmetikverordnung Schweiz - Zusammenfassung',beschreibung:'Kompakte Zusammenfassung der wichtigsten Punkte der Schweizer Kosmetikverordnung (KosmetikV). Aktualisiert April 2026.',typ:'gesetz',nischen:'alle',seiten:6,downloads:456},{id:5,titel:'Laserklassen Uebersicht - Zulassungspflichten CH',beschreibung:'Infoblatt zu den Laserklassen 1-4 und den jeweiligen Zulassungspflichten in der Schweiz. Inkl. kantonale Unterschiede.',typ:'info',nischen:'laser',seiten:2,downloads:178},{id:6,titel:'Nachsorgeblatt Nageldesign / Gel',beschreibung:'Professionelles Nachsorgeblatt fuer Gel- und Acrylnaegel. Pflegehinweise, Haltbarkeit und Kontaktinformationen.',typ:'vorlage',nischen:'nagel',seiten:1,downloads:267},{id:7,titel:'REACH-konforme Pigmente - Verbotsliste 2026',beschreibung:'Aktuelle Liste der in der EU und Schweiz verbotenen Pigmente fuer PMU und Tattoos. Stand: Januar 2026.',typ:'gesetz',nischen:'pmu',seiten:3,downloads:389},{id:8,titel:'Erstgespraech-Bogen Kosmetikberatung',beschreibung:'Strukturierter Erstgespraeachsbogen fuer die Kundenberatung. Anamnese, Kontraindikationen und Wunschbehandlung.',typ:'vorlage',nischen:'alle',seiten:2,downloads:203}];const icons={checkliste:{bg:'#F0FFF4',color:'#2E7D32',svg:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>'},vorlage:{bg:'#F0F4FF',color:'#1565C0',svg:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>'},info:{bg:'#FFF8F0',color:'#E65100',  12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Herunterladen</button><button class="btn-close" onclick="document.getElementById('modal').classList.remove('open')">Schliessen</button></div>`;document.getElementById('modal').classList.add('open');}function downloadDoc(id){alert('Download-Funktion folgt in Kuerze. Dokument wird von BeautyHub bereitgestellt.');}function setTyp(typ,el){currentTyp=typ;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderDocs();}function filterDocs(){renderDocs();}function renderDocs(){const q=(document.getElementById('searchInput').value||'').toLowerCase();const filtered=allDocs.filter(d=>{const matchTyp=currentTyp==='alle'||d.typ===currentTyp;const matchSearch=!q||d.titel.toLowerCase().includes(q)||d.beschreibung.toLowerCase().includes(q);return matchTyp&&matchSearch;});const groups={checkliste:[],vorlage:[],info:[],gesetz:[]};filtered.forEach(d=>{if(groups[d.typ])groups[d.typ].push(d);});let html='';if(currentTyp==='alle'){Object.entries({checkliste:'Checklisten',vorlage:'Vorlagen',info:'Infoblaetter',gesetz:'Gesetze & Recht'}).forEach(([k,label])=>{if(groups[k].length){html+=`<div class="section-title">${label}</div><div class="docs-list">${groups[k].map(docCard).join('')}</div>`;}});}else{html=`<div class="docs-list">${filtered.map(docCard).join('')}</div>`;}document.getElementById('content').innerHTML=html||'<div style="text-align:center;padding:60px 20px;color:#9A9A9A">Keine Dokumente gefunden</div>';}async function load(){document.getElementById('content').innerHTML='<div style="padding:16px"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>';try{const{data,error}=await sb.from('dokumente').select('*').order('erstellt_am',{ascending:false});if(!error&&data&&data.length)allDocs=data;}catch(e){}renderDocs();}async function init(){const{data}=await sb.auth.getUser();if(data?.user){const n=data.user.user_metadata?.name||data.user.email||'M';document.getElementById('av').textContent=n[0].toUpperCase();}}init();load();</script></body></html>
