h<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BeautyHub - Community</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Jost',sans-serif;background:#faf8f5;min-height:100vh;padding-bottom:80px}.header{background:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EAE0;position:sticky;top:0;z-index:100}.header h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#1A1A2E}.avatar{width:36px;height:36px;border-radius:50%;background:#b8924a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;cursor:pointer}.compose{margin:16px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.05);display:flex;align-items:center;gap:12px}.compose-av{width:38px;height:38px;border-radius:50%;background:#b8924a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:600;flex-shrink:0}.compose-input{flex:1;background:#faf8f5;border:1.5px solid #E8E0D5;border-radius:12px;padding:11px 16px;font-family:'Jost',sans-serif;font-size:14px;color:#9A9A9A;cursor:pointer;text-align:left}.compose-btn{background:#b8924a;color:#fff;border:none;border-radius:12px;padding:10px 18px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;flex-shrink:0}.filter-wrap{overflow-x:auto;padding:0 16px 14px;scrollbar-width:none}.filter-wrap::-webkit-scrollbar{display:none}.filters{display:flex;gap:8px;white-space:nowrap}.filter-btn{padding:8px 16px;border-radius:20px;border:1.5px solid #E8E0D5;background:#fff;font-family:'Jost',sans-serif;font-size:13px;color:#6B6B6B;cursor:pointer;transition:all .2s;font-weight:500}.filter-btn.active{background:#1A1A2E;color:#fff;border-color:#1A1A2E}.posts{padding:0 16px}.post{background:#fff;border-radius:16px;margin-bottom:12px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}.post-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}.post-av{width:38px;height:38px;border-radius:50%;background:#E8DDD0;display:flex;align-items:center;justify-content:center;color:#b8924a;font-size:16px;font-weight:600;flex-shrink:0}.post-meta{flex:1}.post-name{font-size:14px;font-weight:600;color:#1A1A2E}.post-info{font-size:12px;color:#9A9A9A;margin-top:2px}.nische-tag{display:inline-block;padding:2px 10px;background:#FFF8F0;color:#b8924a;border-radius:20px;font-size:11px;font-weight:600;margin-left:6px}.post-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#1A1A2E;line-height:1.35;margin-bottom:8px}.post-body{font-size:14px;color:#5A5A5A;line-height:1.7;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}.post-footer{display:flex;align-items:center;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid #F5F0EA}.post-action{display:flex;align-items:center;gap:5px;font-size:13px;color:#9A9A9A;cursor:pointer;transition:color .2s}.post-action:hover{color:#b8924a}.post-action svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}.modal.open{display:flex}.modal-card{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;padding-bottom:36px}.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#1A1A2E;margin-bottom:16px}.modal-textarea{width:100%;background:#faf8f5;border:1.5px solid #E8E0D5;border-radius:12px;padding:14px 16px;font-family:'Jost',sans-serif;font-size:15px;color:#1A1A2E;resize:none;height:120px;outline:none}.modal-textarea:focus{border-color:#b8924a}.modal-nischen{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.modal-nische-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #E8E0D5;background:#fff;font-family:'Jost',sans-serif;font-size:12px;color:#6B6B6B;cursor:pointer}.modal-nische-btn.sel{background:#1A1A2E;color:#fff;border-color:#1A1A2E}.modal-actions{display:flex;gap:10px;margin-top:14px}.btn-cancel{flex:1;padding:13px;border:1.5px solid #E8E0D5;background:#fff;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;color:#6B6B6B}.btn-post{flex:2;padding:13px;background:#b8924a;color:#fff;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;font-weight:500;cursor:pointer}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EAE0;display:flex;padding:8px 0 20px}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4}.nav-item.active{opacity:1}.nav-item span{font-size:10px;font-weight:500;color:#1A1A2E}.nav-item svg{width:22px;height:22px;stroke:#1A1A2E;fill:none;stroke-width:1.8}.skeleton{background:linear-gradient(90deg,#f0ebe4 25%,#e8e0d8 50%,#f0ebe4 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:16px;height:160px;margin-bottom:12px}@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}</style></head><body><div class="header"><h1>Community</h1><div class="avatar" id="av" onclick="location.href='profil.html'">M</div></div><div class="compose"><div class="compose-av" id="compAv">M</div><div class="compose-input" onclick="openModal()">Frage stellen oder Erfahrung teilen...</div><button class="compose-btn" onclick="openModal()">Posten</button></div><div class="filter-wrap"><div class="filters"><button class="filter-btn active" onclick="setN('alle',this)">Alle</button><button class="filter-btn" onclick="setN('laser',this)">Laser</button><button class="filter-btn" onclick="setN('gesicht',this)">Gesicht</button><button class="filter-btn" onclick="setN('nagel',this)">Naegel</button><button class="filter-btn" onclick="setN('pmu',this)">PMU</button><button class="filter-btn" onclick="setN('wimpern',this)">Wimpern</button><button class="filter-btn" onclick="setN('haar',this)">Haar</button><button class="filter-btn" onclick="setN('med',this)">Med</button></div></div><div class="posts" id="posts"></div><div class="modal" id="modal"><div class="modal-card"><div class="modal-title">Neuer Beitrag</div><textarea class="modal-textarea" id="postText" placeholder="Was moechtest du teilen?"></textarea><div class="modal-nischen"><button class="modal-nische-btn" onclick="toggleN(this,'laser')">Laser</button><button class="modal-nische-btn" onclick="toggleN(this,'gesicht')">Gesicht</button><button class="modal-nische-btn" onclick="toggleN(this,'nagel')">Naegel</button><button class="modal-nische-btn" onclick="toggleN(this,'pmu')">PMU</button><button class="modal-nische-btn" onclick="toggleN(this,'wimpern')">Wimpern</button><button class="modal-nische-btn" onclick="toggleN(this,'haar')">Haar</button></div><div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Abbrechen</button><button class="btn-post" onclick="submitPost()">Veroeffentlichen</button></div></div></div><nav class="bottom-nav"><div class="nav-item" onclick="location.href='feed.html'"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Feed</span></div><div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg><span>Community</span></div><div class="nav-item" onclick="location.href='marktplatz.html'"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span>Markt</span></div><div class="nav-item" onclick="location.href='dokumente.html'"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Docs</span></div><div class="nav-item" onclick="location.href='profil.html'"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profil</span></div></nav><script>const sb=supabase.createClient('https://ypdybccegznjlxzqqxut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZHliY2NlZ3puamx4enFxeHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTgzNjQsImV4cCI6MjA5MjY5NDM2NH0.hs3ssZBVDHqOu3ufn4mB3trrMzGuDsQfjnB9Q9rxixU');let nische='alle',selNischen=[],userName='M';const demo=[{id:1,titel:'Wer hat Erfahrung mit dem Nd:YAG Laser fuer dunkle Hauttypen?',inhalt:'Ich suche Kolleginnen die bereits Erfahrung mit dem Nd:YAG 1064nm bei Hauttyp IV-V haben. Welche Parameter verwendet ihr fuer die Haarentfernung? Ich moechte meine Einstellungen optimieren.',nischen:'laser',autor_name:'Sophie K.',erstellt_am:'2026-04-20T08:30:00',likes:12,kommentare_count:5},{id:2,titel:'Empfehlung fuer PMU-Pigmente die REACH-konform sind?',inhalt:'Nach den neuen EU-Richtlinien suche ich nach REACH-konformen Pigmenten fuer Augenbrauen PMU. Hat jemand gute Erfahrungen mit schweizer Lieferanten gemacht?',nischen:'pmu',autor_name:'Lena M.',erstellt_am:'2026-04-19T14:00:00',likes:8,kommentare_count:11},{id:3,titel:'Tipps gegen Hebelifting bei sehr feinen Haaren?',inhalt:'Ich habe Kundinnen mit extrem feinen Haaren bei denen das Wimpernlifting schnell durchhaengt. Welche Lotions verwendet ihr und wie lange lasst ihr einwirken?',nischen:'wimpern',autor_name:'Nina B.',erstellt_am:'2026-04-18T10:15:00',likes:19,kommentare_count:7},{id:4,titel:'Gel-Allergien nehmen zu - was sind eure Erfahrungen?',inhalt:'Ich beobachte seit einigen Monaten vermehrt Kontaktallergien bei Gelnaegeln. Hat jemand auf HEMA-freie Produkte umgestellt und wie sind die Erfahrungen damit?',nischen:'nagel',autor_name:'Tanja R.',erstellt_am:'2026-04-17T16:45:00',likes:31,kommentare_count:14}];function timeAgo(d){const diff=Date.now()-new Date(d).getTime();const h=Math.floor(diff/3600000);if(h<1)return'Gerade eben';if(h<24)return`vor ${h}h`;return`vor ${Math.floor(h/24)} Tagen`;}function postCard(p){const n=(p.nischen||'').split(',')[0];return`<div class="post"><div class="post-header"><div class="post-av">${(p.autor_name||'?')[0].toUpperCase()}</div><div class="post-meta"><div class="post-name">${p.autor_name||'Unbekannt'}${n?`<span class="nische-tag">${n.trim()}</span>`:''}</div><div class="post-info">${timeAgo(p.erstellt_am)}</div></div></div><div class="post-title">${p.titel||''}</div><div class="post-body">${p.inhalt||''}</div><div class="post-footer"><span class="post-action"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${p.likes||0}</span><span class="post-action"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${p.kommentare_count||0} Antworten</span><span class="post-action" style="margin-left:auto"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Teilen</span></div></div>`;}function setN(n,el){nische=n;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}function openModal(){document.getElementById('modal').classList.add('open');}function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('postText').value='';selNischen=[];document.querySelectorAll('.modal-nische-btn').forEach(b=>b.classList.remove('sel'));}function toggleN(el,n){if(selNischen.includes(n)){selNischen=selNischen.filter(x=>x!==n);el.classList.remove('sel');}else{selNischen.push(n);el.classList.add('sel');}}async function submitPost(){const text=document.getElementById('postText').value.trim();if(!text)return;const{data:user}=await sb.auth.getUser();if(!user?.user){alert('Bitte zuerst anmelden.');closeModal();return;}const{error}=await sb.from('posts').insert({titel:text.substring(0,80),inhalt:text,typ:'community',nischen:selNischen.join(','),autor_id:user.user.id,ist_agent:false,likes:0});if(!error){closeModal();load();}}async function load(){const p=document.getElementById('posts');p.innerHTML='<div class="skeleton"></div><div class="skeleton"></div>';try{let q=sb.from('posts').select('*').eq('typ','community').order('erstellt_am',{ascending:false}).limit(20);if(nische!=='alle')q=q.ilike('nischen',`%${nische}%`);const{data,error}=await q;const posts=(error||!data||!data.length)?demo.filter(d=>nische==='alle'||d.nischen.includes(nische)):data;p.innerHTML=posts.length?posts.map(postCard).join(''):`<div style="text-align:center;padding:60px 20px;color:#9A9A9A"><p>Noch keine Beitraege in dieser Kategorie</p></div>`;}catch(e){p.innerHTML=demo.map(postCard).join('');}}async function init(){const{data}=await sb.auth.getUser();if(data?.user){const n=data.user.user_metadata?.name||data.user.email||'M';const ini=n[0].toUpperCase();document.getElementById('av').textContent=ini;document.getElementById('compAv').textContent=ini;}}init();load();</script></body></html>
