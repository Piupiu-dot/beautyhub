<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BeautyHub Schweiz - Login</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Jost',sans-serif;background:#faf8f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{width:100%;max-width:420px}.logo{text-align:center;margin-bottom:40px}.logo h1{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:700;color:#1A1A2E}.logo p{color:#b8924a;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}.card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 4px 40px rgba(0,0,0,0.08)}.tabs{display:flex;margin-bottom:28px;background:#faf8f5;border-radius:12px;padding:4px;gap:4px}.tab{flex:1;padding:11px;text-align:center;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#9A9A9A;transition:all .2s}.tab.active{background:#fff;color:#1A1A2E;box-shadow:0 2px 8px rgba(0,0,0,0.08)}.form-group{margin-bottom:18px}label{display:block;font-size:11px;font-weight:500;color:#6B6B6B;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}input{width:100%;padding:14px 16px;border:1.5px solid #E8E0D5;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;color:#1A1A2E;background:#faf8f5;outline:none;transition:border .2s}input:focus{border-color:#b8924a;background:#fff}.btn{width:100%;padding:15px;background:#b8924a;color:#fff;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-top:6px;transition:background .2s}.btn:hover{background:#a07a3a}.divider{text-align:center;margin:22px 0 0;color:#C0B0A0;font-size:12px}.msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:18px;display:none}.msg.error{background:#FFF0F0;color:#C0392B;border:1px solid #F5C6C6}.msg.success{background:#F0FFF4;color:#2D6A4F;border:1px solid #B7E4C7}</style></head><body><div class="container"><div class="logo"><h1>BeautyHub</h1><p>Schweiz</p></div><div class="card"><div class="tabs"><div class="tab active" onclick="switchTab('login')">Anmelden</div><div class="tab" onclick="switchTab('register')">Registrieren</div></div><div id="msg" class="msg"></div><div id="login-form"><div class="form-group"><label>E-Mail</label><input type="email" id="login-email" placeholder="deine@email.ch"></div><div class="form-group"><label>Passwort</label><input type="password" id="login-pw" placeholder="Passwort eingeben"></div><button class="btn" onclick="doLogin()">Anmelden</button></div><div id="register-form" style="display:none"><div class="form-group"><label>Name</label><input type="text" id="reg-name" placeholder="Dein Name"></div><div class="form-group"><label>E-Mail</label><input type="email" id="reg-email" placeholder="deine@email.ch"></div><div class="form-group"><label>Passwort</label><input type="password" id="reg-pw" placeholder="Min. 8 Zeichen"></div><button class="btn" onclick="doRegister()">Konto erstellen</button></div><div class="divider">BeautyHub Schweiz - Fuer Kosmetikfachleute</div></div></div><script>const sb=supabase.createClient('https://ypdybccegznjlxzqqxut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZHliY2NlZ3puamx4enFxeHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTgzNjQsImV4cCI6MjA5MjY5NDM2NH0.hs3ssZBVDHqOu3ufn4mB3trrMzGuDsQfjnB9Q9rxixU');function switchTab(t){document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1)));document.getElementById('login-form').style.display=t==='login'?'block':'none';document.getElementById('register-form').style.display=t==='register'?'block':'none';showMsg('','');}function showMsg(txt,type){const m=document.getElementById('msg');m.textContent=txt;m.className='msg '+type;m.style.display=txt?'block':'none';}async function doLogin(){const email=document.getElementById('login-email').value;const pw=document.getElementById('login-pw').value;if(!email||!pw)return showMsg('Bitte alle Felder ausfullen.','error');const{error}=await sb.auth.signInWithPassword({email,password:pw});if(error)return showMsg(error.message,'error');showMsg('Willkommen!','success');setTimeout(()=>window.location.href='feed.html',1200);}async function doRegister(){const name=document.getElementById('reg-name').value;const email=document.getElementById('reg-email').value;const pw=document.getElementById('reg-pw').value;if(!name||!email||!pw)return showMsg('Bitte alle Felder ausfullen.','error');const{error}=await sb.auth.signUp({email,password:pw,options:{data:{name}}});if(error)return showMsg(error.message,'error');showMsg('Konto erstellt! Bitte E-Mail bestatigen.','success');}</script></body></html>
