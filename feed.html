s,box-shadow .15s}.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.1)}.card:active{transform:scale(0.99)}.card-img{width:100%;height:130px;background:#F5EFE8;display:flex;align-items:center;justify-content:center}.card-body{padding:16px}.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}.badge-gesetz{background:#E8F5E9;color:#2E7D32}.badge-trend{background:#F3E5F5;color:#6A1B9A}.badge-news{background:#FFF3E0;color:#E65100}.badge-ki{background:#E3F2FD;color:#1565C0}.nische{font-size:11px;color:#b8924a;font-weight:500}.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#1A1A2E;line-height:1.3;margin-bottom:8px}.card-summary{font-size:13px;color:#767676;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #F5F0EA}.card-source{font-size:12px;color:#b8924a;font-weight:500}.likes{display:flex;align-items:center;gap:4px;font-size:12px;color:#9A9A9A}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EAE0;display:flex;padding:8px 0 20px;z-index:100}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4}.nav-item.active{opacity:1}.nav-item span{font-size:10px;font-weight:500;color:#1A1A2E}.nav-item svg{width:22px;height:22px;stroke:#1A1A2E;fill:none;stroke-width:1.8}.skeleton{background:linear-gradient(90deg,#f0ebe4 25%,#e8e0d8 50%,#f0ebe4 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:16px;height:200px;margin-bottom:12px}@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

<script>const sb=supabase.createClient('https://ypdybccegznjlxzqqxut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZHliY2NlZ3puamx4enFxeHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTgzNjQsImV4cCI6MjA5MjY5NDM2NH0.hs3ssZBVDHqOu3ufn4mB3trrMzGuDsQfjnB9Q9rxixU');let nische='alle',sort='neu';const demo=[{id:1,titel:'Neue Laserklassen-Vorschriften 2026',zusammenfassung:'Das Gesundheitsamt hat aktualisierte Richtlinien fuer den Einsatz von Lasergeraeten erlassen. Kosmetikstudios benoetigen ab Juli eine erweiterte Zertifizierung fuer Geraete ab Klasse 3B.',typ:'gesetz',nischen:'laser',quelle_name:'BAG Schweiz',likes:24,ist_agent:true},{id:2,titel:'PMU-Pigmente: EU-Richtlinie jetzt relevant',zusammenfassung:'Die REACH-Verordnung schraenkt weitere Pigmentfarben ein. Betroffen sind besonders bestimmte Blau- und Gruentoene fuer permanentes Make-up.',typ:'gesetz',nischen:'pmu',quelle_name:'Swissmedic',likes:18,ist_agent:true},{id:3,titel:'Bio-Fermentation: Der groesste Beauty-Trend 2026',zusammenfassung:'Fermentierte Wirkstoffe gelten als der groesste Trend. Lacto-Fermentation verbessert die Bioverfuegbarkeit von Vitaminen und staerkt die Hautbarriere messbar.',typ:'trend',nischen:'gesicht',quelle_name:'Cosmetica Suisse',likes:41,ist_agent:true},{id:4,titel:'Neue Erkenntnisse zu Gel-Systemen bei Naegeln',zusammenfassung:'Studie zeigt: Pausen zwischen Gel-Applikationen reduzieren Schaeden um 60 Prozent. Mindestpause von 2 Wochen empfohlen.',typ:'news',nischen:'nagel',quelle_name:'SDKF',likes:35,ist_agent:false}];function svgIcon(){return`<svg width="60" height="60" viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="22" stroke="#8a7055" stroke-width="1.5"/><path d="M22 30 Q30 18 38 30 Q30 42 22 30Z" stroke="#8a7055" stroke-width="1.5" fill="none"/><circle cx="30" cy="30" r="4" stroke="#8a7055" stroke-width="1.5"/></svg>`;}function card(p){const n=(p.nischen||'').split(',')[0];return`<div class="card" data-id="${p.id}" onclick="goDetail(this)"><div class="card-img">${svgIcon()}</div><div class="card-body"><div class="card-meta"><span class="badge badge-${p.typ||'news'}">${p.typ==='gesetz'?'Gesetz':p.typ==='trend'?'Trend':'News'}</span>${n?`<span class="nische">${n.trim()}</span>`:''}${p.ist_agent?`<span class="badge badge-ki">KI</span>`:''}</div><div class="card-title">${p.titel}</div><div class="card-summary">${p.zusammenfassung||''}</div><div class="card-footer"><span class="card-source">${p.quelle_name||'BeautyHub'}</span><span class="likes"><svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${p.likes||0}</span></div></div></div>`;}function goDetail(el){const id=el.dataset.id;window.location.href='detail.html'+(id?'?id='+id:'');}function setN(n,el){nische=n;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}function setS(s,el){sort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}async function load(){const f=document.getElementById('feed');f.innerHTML='<div class="skeleton"></div><div class="skeleton"></div>';try{let q=sb.from('posts').select('*').order('erstellt_am',{ascending:false}).limit(20);if(nische!=='alle')q=q.ilike('nischen',`%${nische}%`);if(sort==='gesetz')q=q.eq('typ','gesetz');if(sort==='trend')q=q.eq('typ','trend');if(sort==='beliebt')q=sb.from('posts').select('*').order('likes',{ascending:false}).limit(20);const{data,error}=await q;const posts=(error||!data||!data.length)?demo.filter(p=>nische==='alle'||p.nischen.includes(nische)):data;f.innerHTML=posts.length?posts.map(card).join(''):`<div style="text-align:center;padding:60px 20px;color:#9A9A9A">Keine Inhalte gefunden</div>`;}catch(e){f.innerHTML=demo.map(card).join('');}}async function init(){const{data}=await sb.auth.getUser();if(data?.user){const n=data.user.user_metadata?.name||data.user.email||'M';document.getElementById('av').textContent=n[0].toUpperCase();}}init();load();</script></body></html>
