<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BeautyHub - Feed</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Jost',sans-serif;background:#faf8f5;min-height:100vh;padding-bottom:80px}.header{background:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EAE0;position:sticky;top:0;z-index:100}.header h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#1A1A2E}.avatar{width:36px;height:36px;border-radius:50%;background:#b8924a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;cursor:pointer}.filter-wrap{overflow-x:auto;padding:14px 16px;background:#fff;border-bottom:1px solid #F0EAE0;scrollbar-width:none}.filter-wrap::-webkit-scrollbar{display:none}.filters{display:flex;gap:8px;white-space:nowrap}.filter-btn{padding:8px 16px;border-radius:20px;border:1.5px solid #E8E0D5;background:#fff;font-family:'Jost',sans-serif;font-size:13px;color:#6B6B6B;cursor:pointer;transition:all .2s;font-weight:500}.filter-btn.active{background:#1A1A2E;color:#fff;border-color:#1A1A2E}.sort-wrap{padding:12px 16px;display:flex;gap:16px;border-bottom:1px solid #F0EAE0;overflow-x:auto;scrollbar-width:none}.sort-btn{font-size:13px;color:#9A9A9A;cursor:pointer;font-weight:500;padding:4px 0;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}.sort-btn.active{color:#b8924a;border-bottom-color:#b8924a}.feed{padding:12px 16px}.card{background:#fff;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.05)}.card-img{width:100%;height:130px;background:#F5EFE8;display:flex;align-items:center;justify-content:center}.card-body{padding:16px}.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}.badge-gesetz{background:#E8F5E9;color:#2E7D32}.badge-trend{background:#F3E5F5;color:#6A1B9A}.badge-news{background:#FFF3E0;color:#E65100}.badge-ki{background:#E3F2FD;color:#1565C0}.nische{font-size:11px;color:#b8924a;font-weight:500}.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#1A1A2E;line-height:1.3;margin-bottom:8px}.card-summary{font-size:13px;color:#767676;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #F5F0EA}.card-source{font-size:12px;color:#b8924a;font-weight:500}.likes{display:flex;align-items:center;gap:4px;font-size:12px;color:#9A9A9A}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EAE0;display:flex;padding:8px 0 20px}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4}.nav-item.active{opacity:1}.nav-item span{font-size:10px;font-weight:500;color:#1A1A2E}.nav-item svg{width:22px;height:22px;stroke:#1A1A2E;fill:none;stroke-width:1.8}.skeleton{background:linear-gradient(90deg,#f0ebe4 25%,#e8e0d8 50%,#f0ebe4 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:16px;height:200px;margin-bottom:12px}@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:flex-end;justify-content:center}

.detail-source-link{display:inline-flex;align-items:center;gap:8px;background:#FFF8F0;color:#b8924a;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;border:1.5px solid #F0E0C0;margin-bottom:12px}
.detail-source-link:hover{background:#F5E8D0}
.detail-source-link svg{width:16px;height:16px;stroke:#b8924a;fill:none;stroke-width:2}
.detail-date{font-size:12px;color:#C0B0A0;margin-top:8px}
</style></head><body><div class="header"><h1>BeautyHub</h1><div class="avatar" id="av" onclick="location.href='profil.html'">M</div></div><div class="filter-wrap"><div class="filters"><button class="filter-btn active" onclick="setN('alle',this)">Alle</button><button class="filter-btn" onclick="setN('laser',this)">Laser</button><button class="filter-btn" onclick="setN('gesicht',this)">Gesicht</button><button class="filter-btn" onclick="setN('nagel',this)">Naegel</button><button class="filter-btn" onclick="setN('pmu',this)">PMU</button><button class="filter-btn" onclick="setN('wimpern',this)">Wimpern</button><button class="filter-btn" onclick="setN('haar',this)">Haar</button><button class="filter-btn" onclick="setN('med',this)">Med</button></div></div><div class="sort-wrap"><span class="sort-btn active" onclick="setS('neu',this)">Aktuell</span><span class="sort-btn" onclick="setS('beliebt',this)">Beliebt</span><span class="sort-btn" onclick="setS('gesetz',this)">Gesetze</span><span class="sort-btn" onclick="setS('trend',this)">Trends</span></div><div class="feed" id="feed"></div><nav class="bottom-nav"><div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Feed</span></div><div class="nav-item" onclick="location.href='community.html'"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg><span>Community</span></div><div class="nav-item" onclick="location.href='marktplatz.html'"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span>Markt</span></div><div class="nav-item" onclick="location.href='dokumente.html'"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Docs</span></div><div class="nav-item" onclick="location.href='profil.html'"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profil</span></div></nav><script>const sb=supabase.createClient('https://ypdybccegznjlxzqqxut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZHliY2NlZ3puamx4enFxeHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTgzNjQsImV4cCI6MjA5MjY5NDM2NH0.hs3ssZBVDHqOu3ufn4mB3trrMzGuDsQfjnB9Q9rxixU');let nische='alle',sort='neu';const demo=[{id:1,titel:'Neue Laserklassen-Vorschriften 2026',zusammenfassung:'Das Gesundheitsamt hat aktualisierte Richtlinien fuer den Einsatz von Lasergeraeten erlassen. Kosmetikstudios benoetigen ab Juli eine erweiterte Zertifizierung fuer Geraete ab Klasse 3B.',typ:'gesetz',nischen:'laser',quelle_name:'BAG Schweiz',likes:24,ist_agent:true},{id:2,titel:'PMU-Pigmente: EU-Richtlinie jetzt relevant',zusammenfassung:'Die REACH-Verordnung schraenkt weitere Pigmentfarben ein. Betroffen sind besonders bestimmte Blau- und Gruentoene fuer permanentes Make-up.',typ:'gesetz',nischen:'pmu',quelle_name:'Swissmedic',likes:18,ist_agent:true},{id:3,titel:'Bio-Fermentation: Der groesste Beauty-Trend 2026',zusammenfassung:'Fermentierte Wirkstoffe gelten als der groesste Trend. Lacto-Fermentation verbessert die Bioverfuegbarkeit von Vitaminen und staerkt die Hautbarriere messbar.',typ:'trend',nischen:'gesicht',quelle_name:'Cosmetica Suisse',likes:41,ist_agent:true},{id:4,titel:'Neue Erkenntnisse zu Gel-Systemen bei Naegeln',zusammenfassung:'Studie zeigt: Pausen zwischen Gel-Applikationen reduzieren Schaeden um 60 Prozent. Mindestpause von 2 Wochen empfohlen.',typ:'news',nischen:'nagel',quelle_name:'SDKF',likes:35,ist_agent:false}];function svgIcon(){return `<svg width="60" height="60" viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="22" stroke="#8a7055" stroke-width="1.5"/><path d="M22 30 Q30 18 38 30 Q30 42 22 30Z" stroke="#8a7055" stroke-width="1.5" fill="none"/><circle cx="30" cy="30" r="4" stroke="#8a7055" stroke-width="1.5"/></svg>`;}function card(p){const n=(p.nischen||'').split(',')[0];return `<div class="card" data-id="${p.id}" style="cursor:pointer" onclick="goDetail(this)"><div class="card-img">${svgIcon()}</div><div class="card-body"><div class="card-meta"><span class="badge badge-${p.typ||'news'}">${p.typ==='gesetz'?'Gesetz':p.typ==='trend'?'Trend':'News'}</span>${n?`<span class="nische">${n.trim()}</span>`:''}${p.ist_agent?`<span class="badge badge-ki">KI</span>`:''}</div><div class="card-title">${p.titel}</div><div class="card-summary">${p.zusammenfassung||''}</div><div class="card-footer"><span class="card-source">${p.quelle_name||'BeautyHub'}</span><span class="likes"><svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${p.likes||0}</span></div></div></div>`;}function setN(n,el){nische=n;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}function setS(s,el){sort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');load();}async function load(){const f=document.getElementById('feed');f.innerHTML='<div class="skeleton"></div><div class="skeleton"></div>';try{let q=sb.from('posts').select('*').order('erstellt_am',{ascending:false}).limit(20);if(nische!=='alle')q=q.ilike('nischen',`%${nische}%`);if(sort==='gesetz')q=q.eq('typ','gesetz');if(sort==='trend')q=q.eq('typ','trend');if(sort==='beliebt')q=sb.from('posts').select('*').order('likes',{ascending:false}).limit(20);const{data,error}=await q;const posts=(error||!data||!data.length)?demo.filter(p=>nische==='alle'||p.nischen.includes(nische)):data;f.innerHTML=posts.length?posts.map(card).join(''):`<div style="text-align:center;padding:60px 20px;color:#9A9A9A"><p>Keine Inhalte fuer diese Nische</p></div>`;}catch(e){f.innerHTML=demo.map(card).join('');}}async function init(){const{data}=await sb.auth.getUser();if(data?.user){const n=data.user.user_metadata?.name||data.user.email||'U';document.getElementById('av').textContent=n[0].toUpperCase();}}init();load();</script>
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-modal" id="detailModal">
    <div class="detail-header">
      <span class="detail-badge" id="dBadge"></span>
      <button class="detail-close" onclick="document.getElementById('detailOverlay').classList.remove('open')">&#x2715;</button>
    </div>
    <div class="detail-title" id="dTitle"></div>
    <div class="detail-body" id="dBody"></div>
    <div id="dSourceWrap"></div>
    <div class="detail-date" id="dDate"></div>
  </div>
</div>
<script>
function goDetail(cardEl){const id=cardEl.dataset.id;window.location.href="detail.html"+(id?"?id="+id:"");}function openDetail(cardEl) {
  const title = cardEl.querySelector('.card-title')?.innerText || '';
  const body = cardEl.querySelector('.card-summary')?.innerText || '';
  const source = cardEl.querySelector('.card-source')?.innerText || '';
  const badgeEl = cardEl.querySelector('.badge');
  const badge = badgeEl?.innerText || '';
  const badgeClass = badgeEl?.className || '';

  document.getElementById('dTitle').innerText = title;
  document.getElementById('dBody').innerText = body;
  
  const b = document.getElementById('dBadge');
  b.innerText = badge;
  b.className = 'detail-badge ' + (badgeClass.includes('gesetz') ? 'badge-gesetz' : badgeClass.includes('trend') ? 'badge-trend' : 'badge-news');
  
  const sw = document.getElementById('dSourceWrap');
  if (source) {
    sw.innerHTML = `<a href="#" class="detail-source-link" onclick="return false"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${source}</a>`;
  } else { sw.innerHTML = ''; }
  
  document.getElementById('dDate').innerText = '';
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('open');
  }
}</script>
</body></html>
